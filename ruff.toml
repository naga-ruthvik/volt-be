# ruff.toml
target-version = "py312"
line-length = 88
indent-width = 4

[lint]
# Enable Django-specific rules
select = [
    "E", # pycodestyle errors
    "W", # pycodestyle warnings
    "F", # pyflakes
    "I", # isort (import sorting)
    "DJ", # Django-specific rules
    "UP", # pyupgrade
    "B", # flake8-bugbear
    "C4", # flake8-comprehensions
    "DTZ", # flake8-datetimez
    "T20", # flake8-print
    "S",
    "SIM", # simplify code
    "PERF", # performance
    "N", # flake8-bandit (security)
]

ignore = [
    "E501", # Line too long (handled by formatter)
    "S101", # Use of assert (OK in tests)
    "DJ001", # Avoid nullable CharField (sometimes needed)
]

# Exclude common Django directories
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "migrations",
    "staticfiles",
    "media",
]

[lint.per-file-ignores]
# Allow imports and print statements in settings
"**/settings.py" = ["F405", "F403"]
# Allow print in management commands
"**/management/commands/*.py" = ["T20"]

[lint.isort]
# Django-specific import ordering
known-first-party = ["volt", "apps"]
section-order = ["future", "standard-library", "django", "third-party", "first-party", "local-folder"]

[lint.isort.sections]
django = ["django"]

[format]
# Use Django's preferred formatting
quote-style = "double"
indent-style = "space"